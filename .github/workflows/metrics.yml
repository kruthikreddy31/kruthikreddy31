name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: kruthikreddy31

          template: classic
          base: header, activity, community, repositories, metadata

          config_timezone: Asia/Kolkata

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_indepth: yes

          # Calendar
          plugin_isocalendar: yes

          # Stars
          plugin_stars: yes

          # Follow-up
          plugin_followup: yes

          # Featured repositories
          plugin_repositories: yes
          plugin_repositories_featured: ShopSphere-Project,Collabflow-Project

          # Topics
          plugin_topics: yes
          plugin_topics_limit: 20

          # Lines of code
          plugin_lines: yes

          # Disable habits (fixes "Unexpected error")
          plugin_habits: no
